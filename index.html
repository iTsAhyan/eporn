<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHYAN PREMIUM OTT</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 10px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { background: #121212; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .info { padding: 8px; }
        .info h3 { font-size: 13px; margin: 0 0 8px 0; height: 35px; overflow: hidden; }
        .btn { display: block; background: #d32f2f; color: white; text-align: center; padding: 8px; text-decoration: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:#d32f2f;">TRENDING PREMIUM</h2>
    <div class="grid" id="main"></div>

    <script>
        // আপনার নতুন ওয়ার্কারের লিংক এখানে বসানো হয়েছে
        const workerURL = "https://epornx.ahyanarfinofficial.workers.dev";

        async function loadContent() {
            const main = document.getElementById('main');
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                // এপিআই রেসপন্স থেকে ভিডিও লিস্ট বের করা
                data.videos.forEach(item => {
                    const v = item.video;
                    // ডিউরেশন ফিল্টার: ১০ মিনিট+
                    const minutes = parseInt(v.duration.split(':')[0]);
                    
                    if (minutes >= 10) {
                        main.innerHTML += `
                            <div class="card">
                                <img src="${v.default_thumb}" alt="thumb">
                                <div class="info">
                                    <h3>${v.title}</h3>
                                    <a href="${v.embed_url}" target="_blank" class="btn">PLAY NOW</a>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch(e) {
                main.innerHTML = "<p style='text-align:center; color:red;'>ডেটা লোড হচ্ছে না। আপনার ওয়ার্কার লিংকটি চেক করুন।</p>";
                console.error("এরর:", e);
            }
        }
        
        loadContent();
    </script>
</body>
</html>
