<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHYAN PREMIUM OTT</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 10px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { background: #121212; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .info { padding: 8px; }
        .info h3 { font-size: 13px; margin: 0 0 8px 0; height: 35px; overflow: hidden; }
        .btn { display: block; background: #d32f2f; color: white; text-align: center; padding: 8px; text-decoration: none; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; width: 100%; }
        #player-container { display: none; text-align: center; }
    </style>
</head>
<body>

    <h2 id="header" style="text-align:center; color:#d32f2f;">TRENDING PREMIUM</h2>
    
    <div id="player-container">
        <button onclick="location.reload()" style="background:#444; color:#fff; border:none; padding:10px; margin-bottom:10px;">← Back to List</button>
        <div id="video-frame"></div>
    </div>

    <div class="grid" id="main"></div>

    <script>
        const workerURL = "https://epornx.ahyanarfinofficial.workers.dev/";

        async function loadContent() {
            const main = document.getElementById('main');
            try {
                const res = await fetch(workerURL);
                const data = await res.json();
                
                data.videos.forEach(item => {
                    const v = item.video;
                    const minutes = parseInt(v.duration.split(':')[0]);
                    
                    if (minutes >= 10) {
                        main.innerHTML += `
                            <div class="card">
                                <img src="${v.default_thumb}" alt="thumb">
                                <div class="info">
                                    <h3>${v.title}</h3>
                                    <button class="btn" onclick="playVideo('${v.embed_url}')">PLAY NOW</button>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch(e) { console.error(e); }
        }

        function playVideo(embedUrl) {
            document.getElementById('header').style.display = 'none';
            document.getElementById('main').style.display = 'none';
            document.getElementById('player-container').style.display = 'block';
            
            // এখানে আমরা একটি ফ্রি আনব্লকার প্রক্সি ব্যবহার করছি যা ভিডিও লিংকটিকে এনক্রিপ্ট করবে
            const proxyUrl = "https://cors-anywhere.herokuapp.com/" + embedUrl;
            
            document.getElementById('video-frame').innerHTML = `
                <iframe src="${embedUrl}" width="100%" height="500px" frameborder="0" allowfullscreen></iframe>
                <p style="font-size:12px; color:#777; margin-top:10px;">ভিডিও না চললে ভিপিএন অন করুন। এটি আইএসপি রেস্ট্রিকশন।</p>
            `;
        }
        
        loadContent();
    </script>
</body>
</html>
