<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="pageTitle">Watching Video</title>
    <meta name="description" id="metaDesc" content="">
    <meta name="keywords" id="metaTags" content="">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <style>
        body { background: #000; color: #fff; margin: 0; }
        .wrapper { width: 100vw; height: 100vh; position: relative; display: flex; flex-direction: column; }
        #adOverlay { position: absolute; top:0; left:0; width:100%; height:100%; background:#000; z-index:20; display:none; justify-content:center; align-items:center; }
        .plyr { width: 100%; height: 100%; }
        .content { padding: 20px; max-width: 900px; margin: auto; }
        .tags { color: #ff9900; margin: 10px 0; }
        .related { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div id="adOverlay">বিজ্ঞাপন চলছে... <span id="timer">5</span></div>
        <video id="myPlayer" playsinline controls></video>
    </div>
    
    <div class="content">
        <h1 id="vTitle"></h1>
        <div class="tags" id="vTags"></div>
        <div class="desc" id="vDesc"></div>
        <div class="related">Related Channels: EpornX Official | Premium Network</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.min.js"></script>
    <script src="videos.js"></script>
    <script src="vidads.js"></script>
    <script>
        const title = new URLSearchParams(window.location.search).get('title');
        const v = videoData.find(x => x.title === title);
        const video = document.getElementById('myPlayer');
        const player = new Plyr(video);

        if(v) {
            document.getElementById('pageTitle').innerText = v.title;
            document.getElementById('vTitle').innerText = v.title;
            document.getElementById('vTags').innerText = "Tags: " + v.tags;
            document.getElementById('vDesc').innerText = v.desc;
            document.getElementById('metaDesc').content = v.desc;
            document.getElementById('metaTags').content = v.tags;

            showAdAndPlay(v.url, () => {
                const hls = new Hls();
                hls.loadSource(v.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    player.fullscreen.enter();
                });
            });
        }
    </script>
</body>
</html>
