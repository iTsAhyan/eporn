<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="pageTitle">Watching Video</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
        .wrapper { width: 100%; max-width: 900px; margin: auto; position: relative; }
        #adOverlay { position: absolute; top:0; left:0; width:100%; height:100%; background:#000; z-index:20; display:none; justify-content:center; align-items:center; }
        .back-btn { display: inline-block; padding: 10px 20px; background: #ff9900; color: #000; text-decoration: none; border-radius: 4px; font-weight: bold; margin: 15px; }
        .content { padding: 20px; max-width: 900px; margin: auto; }
        .video-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .v-card { background: #151515; border-radius: 4px; padding: 5px; text-decoration: none; color: #fff; }
        .v-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Home</a>
    
    <div class="wrapper">
        <div id="adOverlay">Advertising... <span id="timer">5</span></div>
        <video id="myPlayer" playsinline controls></video>
    </div>
    
    <div class="content">
        <h1 id="vTitle"></h1>
        <div id="vTags" style="color: #ff9900;"></div>
        <div id="vDesc" style="margin-top:10px; color:#ccc;"></div>

        <h2 style="margin-top:40px; border-left: 3px solid #ff9900; padding-left:10px;">More Videos</h2>
        <div class="video-grid" id="moreVideos"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.min.js"></script>
    <script src="videos.js"></script>
    <script src="vidads.js"></script>
    <script>
        const title = new URLSearchParams(window.location.search).get('title');
        const video = document.getElementById('myPlayer');
        const player = new Plyr(video);

        // Current Video logic
        const v = videoData.find(x => x.title === title);
        if(v) {
            document.getElementById('pageTitle').innerText = v.title;
            document.getElementById('vTitle').innerText = v.title;
            document.getElementById('vTags').innerText = "Tags: " + v.tags;
            document.getElementById('vDesc').innerText = v.desc;

            showAdAndPlay(v.url, () => {
                const hls = new Hls();
                hls.loadSource(v.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            });
        }

        // More Videos logic
        const moreGrid = document.getElementById('moreVideos');
        videoData.slice(0, 6).forEach(item => {
            if(item.title !== title) {
                moreGrid.innerHTML += `
                    <a href="watch.html?title=${encodeURIComponent(item.title)}" class="v-card">
                        <img src="${item.thumbnail}">
                        <div style="font-size:12px; padding:5px;">${item.title}</div>
                    </a>
                `;
            }
        });
    </script>
</body>
</html>
